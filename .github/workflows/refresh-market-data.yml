name: Refresh Market Data

on:
  schedule:
    # 30 min after market open (09:30 SCL = 13:30 UTC winter / 12:30 UTC summer)
    - cron: '30 13 * * 1-5'
    # After market close (17:30 SCL = 21:30 UTC winter / 20:30 UTC summer)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    # Allow manual trigger from the GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/refresh/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/refresh/requirements.txt

      - name: Run refresh script
        run: python scripts/refresh/refreshMarketData.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/data/stockPrices.json \
            src/data/sectorPerformance.json \
            src/data/indexPerformance.json \
            src/data/marketMeta.json
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit"
          else
            git commit -m "chore(data): market data refresh via yfinance"
            git push
          fi
