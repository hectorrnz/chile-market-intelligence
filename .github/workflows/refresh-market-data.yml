name: Refresh Market Data

on:
  schedule:
    # 30 min after market open (09:30 SCL = 13:30 UTC winter / 12:30 UTC summer)
    - cron: '30 13 * * 1-5'
    # After market close (17:30 SCL = 21:30 UTC winter / 20:30 UTC summer)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    # Allow manual trigger from the GitHub Actions UI
    inputs:
      snapshot_type:
        description: 'Snapshot type for Supabase ingestion'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - midday
          - close
          - manual

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/refresh/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/refresh/requirements.txt

      - name: Run refresh script
        run: python scripts/refresh/refreshMarketData.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/data/stockPrices.json \
            src/data/sectorPerformance.json \
            src/data/indexPerformance.json \
            src/data/marketMeta.json
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit"
          else
            git commit -m "chore(data): market data refresh via yfinance"
            git push
          fi

      - name: Ingest market snapshot to Supabase
        if: ${{ env.MARKET_INGEST_SECRET != '' }}
        continue-on-error: true
        env:
          MARKET_INGEST_SECRET: ${{ secrets.MARKET_INGEST_SECRET }}
        run: |
          SNAP_TYPE="${{ github.event.inputs.snapshot_type || 'auto' }}"
          if [ "$SNAP_TYPE" = "auto" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" -lt 17 ]; then SNAP_TYPE="midday"; else SNAP_TYPE="close"; fi
          fi
          echo "Calling ingest endpoint with snapshotType=${SNAP_TYPE}"
          RESP=$(curl -sf -w "\n%{http_code}" \
            -H "Authorization: Bearer ${MARKET_INGEST_SECRET}" \
            "https://nevada-market-intelligence.vercel.app/api/cron/ingest-market-snapshot?snapshotType=${SNAP_TYPE}" || true)
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | head -c 800)
          echo "HTTP status: ${HTTP_CODE}"
          echo "Response: ${BODY}"
